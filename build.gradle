tasks.register('runNativeCppGemmSweep', Exec) {
    group = 'benchmark'
    description = 'Run the standalone native C++ GEMM sweep executable'
    dependsOn 'buildNativeBackend'

    doFirst {
        File executable = nativeSweepExecutableProvider.get()
        if (!executable.exists()) {
            throw new GradleException("Expected native sweep executable was not produced: ${executable}")
        }
        commandLine executable.absolutePath
        if (project.hasProperty('nativeSweepArgs')) {
            commandLine += project.property('nativeSweepArgs').toString().split('\\s+').findAll { !it.isBlank() }
        }
    }
}

