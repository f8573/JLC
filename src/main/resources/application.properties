# SECURITY PATCH: Removed global framework trust for X-Forwarded headers
# server.forward-headers-strategy=framework

# IF running behind a trusted proxy, uncomment and strictly configure the trusted proxy IPs:
# server.tomcat.remoteip.internal-proxies=10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}|169\\.254\\.\\d{1,3}\\.\\d{1,3}|127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|172\\.1[6-9]{1}\\.\\d{1,3}\\.\\d{1,3}|172\\.2[0-9]{1}\\.\\d{1,3}\\.\\d{1,3}|172\\.3[0-1]{1}\\.\\d{1,3}\\.\\d{1,3}
# server.tomcat.remoteip.remote-ip-header=x-forwarded-for
# server.tomcat.remoteip.protocol-header=x-forwarded-proto

# SECURITY PATCH: Defend against giant JSON payloads causing heap exhaustion
# Limit the maximum size of the HTTP request body (e.g., 2 Megabytes)
spring.servlet.multipart.max-request-size=2MB
spring.servlet.multipart.max-file-size=2MB

# Limit Tomcat's form post size
server.tomcat.max-http-form-post-size=2097152

# Limit Jackson parsing depth and array sizes natively to prevent deep-nesting DoS
spring.jackson.parser.max-nesting-depth=100

# Hard cap for JSON request bodies (enforced by RequestSizeLimitFilter)
app.security.max-json-bytes=1048576

# Heavy compute endpoint controls
app.security.max-heavy-concurrency=2
app.security.max-heavy-queue=20
app.security.heavy-rate-limit-per-minute=30
app.security.max-sse-clients=200
app.security.sse-connect-rate-per-minute=30
# Optional shared token for heavy endpoints (/api/diagnostics*, /api/benchmark*, /api/diagnostics/stream).
# Set via environment in production, e.g. APP_SECURITY_HEAVY_ENDPOINT_TOKEN.
app.security.heavy-endpoint-token=
# Keep false in production. Localhost requests are still allowed without token.
app.security.allow-public-heavy-endpoints=false
# Keep backend version hidden by default to reduce fingerprinting.
app.security.expose-version=false

# Disable debug endpoints in production by default
app.debug.endpoints.enabled=false

# Contact form abuse controls
app.contact.rate-limit-per-hour=12
app.contact.max-field-length=256
app.contact.max-message-length=4000
app.contact.block-cross-site=true
