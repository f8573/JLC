server.forward-headers-strategy=framework
# Limits to harden server under heavy compute
server.tomcat.max-threads=8
server.tomcat.accept-count=8
spring.servlet.multipart.max-request-size=3MB
server.tomcat.max-swallow-size=3MB
server.error.include-stacktrace=never
# Control whether lightweight CPU benchmark runs at startup (default=false)
faulj.benchmark.runOnStartup=false
# Dense compute backend selection for phase 1:
#   jlc.backend=java   (default)
#   jlc.backend=native (route compatible GEMM calls through JNI and fall back to Java when unavailable)
#   jlc.backend=auto   (prefer JNI GEMM when available, otherwise use Java)
# QR backend auto-selection can be refined with:
#   jlc.native.qr.square.decomposeBands / factorizeBands
#   jlc.native.qr.wide.decomposeBands / factorizeBands
#   jlc.native.qr.tall.decomposeBands / factorizeBands
#   jlc.native.qr.tall.factorizeGrid   (rectangular short-dimension x long-dimension selector)
#   jlc.native.qr.calibration.path     (load measured QR crossover properties from a .properties file)
