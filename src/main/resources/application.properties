server.forward-headers-strategy=framework
# Limits to harden server under heavy compute
server.tomcat.max-threads=8
server.tomcat.accept-count=8
spring.servlet.multipart.max-request-size=3MB
server.tomcat.max-swallow-size=3MB
server.error.include-stacktrace=never
# Control whether lightweight CPU benchmark runs at startup (default=false)
faulj.benchmark.runOnStartup=false
# Dense compute backend selection:
#   jlc.backend=auto   (default; probe JNI when dispatch policy chooses C++)
#   jlc.backend=java   (disable JNI probing and use Java implementations)
#   jlc.backend=native (probe JNI, but algorithm dispatch still decides Java vs C++)
# Algorithm dispatch:
#   jlc.algorithm.backend=auto|java|cpp
#   jlc.algorithm.<name>.backend=auto|java|cpp
#   jlc.algorithm.calibration.path=/path/to/algorithm-dispatch.properties
#   jlc.algorithm.calibration.minSamples=5
#   jlc.algorithm.speedupThreshold=1.10
#   jlc.algorithm.sensitive.speedupThreshold=1.25
